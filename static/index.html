<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA World Cup - Knockout Bracket</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a1628; color: #e0e0e0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 50%, #1a3a5c 100%); padding: 16px 24px;
  text-align: center; border-bottom: 3px solid #c9a84c; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 1.6em; color: #f0d878; letter-spacing: 2px; }
.header .subtitle { font-size: 0.85em; color: #8ab4d8; margin-top: 4px; }
.tabs { display: flex; gap: 2px; background: #0d2137; padding: 8px 24px 0; position: sticky; top: 72px; z-index: 99; }
.tab { padding: 8px 20px; background: #152a40; color: #8ab4d8; border: none; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 0.9em; }
.tab.active { background: #1a3a5c; color: #f0d878; font-weight: bold; }
.container { max-width: 1600px; margin: 0 auto; padding: 20px; }

/* ── Groups Grid ── */
.groups-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 1200px) { .groups-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 900px) { .groups-grid { grid-template-columns: repeat(2, 1fr); } }
.group-card { background: #112233; border-radius: 8px; overflow: hidden; border: 1px solid #1e3a50; }
.group-card .group-header { background: #1a3a5c; padding: 8px 12px; font-weight: bold; color: #f0d878; font-size: 0.95em; }
.group-card table { width: 100%; border-collapse: collapse; font-size: 0.78em; }
.group-card th { background: #0d2137; padding: 5px 6px; text-align: left; color: #8ab4d8; font-weight: normal; font-size: 0.85em; }
.group-card th:nth-child(2), .group-card th:nth-child(6) { text-align: center; }
.group-card td { padding: 4px 6px; border-bottom: 1px solid #0d2137; }
.group-card td:nth-child(2), .group-card td:nth-child(6) { text-align: center; }
.group-card tr.advanced { background: rgba(201,168,76,0.15); }
.group-card tr.advanced td:first-child { font-weight: bold; color: #f0d878; }
.group-card .qual-note { font-size: 0.7em; color: #c9a84c; padding: 6px 8px; border-top: 1px solid #1e3a50; }

/* ── Bracket ── */
.bracket-container { overflow-x: auto; padding: 20px 0; }
.bracket { display: flex; gap: 0; min-width: 1400px; justify-content: center; }
.bracket-round { display: flex; flex-direction: column; justify-content: space-around; min-width: 180px; }
.bracket-round .round-title { text-align: center; color: #f0d878; font-weight: bold; padding: 8px; font-size: 0.85em; background: #1a3a5c; border-radius: 4px; margin-bottom: 6px; }
.bracket-match { background: #112233; border: 1px solid #1e3a50; border-radius: 6px; margin: 4px 8px; cursor: pointer; transition: all 0.2s; overflow: hidden; }
.bracket-match:hover { border-color: #c9a84c; box-shadow: 0 0 12px rgba(201,168,76,0.3); }
.bracket-match .team { padding: 6px 10px; font-size: 0.78em; white-space: nowrap; display: flex; justify-content: space-between; align-items: center; }
.bracket-match .team.home { border-bottom: 1px solid #1e3a50; }
.bracket-match .team .score { font-weight: bold; color: #f0d878; font-size: 1.1em; margin-left: 8px; min-width: 16px; text-align: center; }
.bracket-match .team.winner-team { color: #f0d878; font-weight: bold; }
.bracket-match .team.tbd { color: #555; font-style: italic; }
.bracket-match .match-date { font-size: 0.65em; color: #555; text-align: center; padding: 2px 0; }
.bracket-match .match-venue { font-size: 0.6em; color: #444; text-align: center; padding-bottom: 4px; }
.bracket-match.has-winner { border-color: #2a5a30; background: #0d1a12; }
.bracket-connector { display: flex; align-items: center; justify-content: center; min-width: 40px; }
.bracket-connector svg { width: 100%; height: 100%; }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 200; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #112233; border: 2px solid #1e3a50; border-radius: 12px; padding: 24px; min-width: 360px; max-width: 450px; }
.modal h3 { color: #f0d878; margin-bottom: 16px; text-align: center; }
.modal .match-info { text-align: center; color: #8ab4d8; font-size: 0.85em; margin-bottom: 12px; }
.modal .team-row { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
.modal .team-row label { flex: 1; color: #e0e0e0; font-weight: bold; font-size: 0.95em; }
.modal .team-row select { flex: 2; background: #0d2137; color: #e0e0e0; border: 1px solid #1e3a50; padding: 6px 10px; border-radius: 4px; font-size: 0.9em; }
.modal .score-row { display: flex; align-items: center; gap: 10px; margin: 12px 0; }
.modal .score-row label { flex: 1; color: #e0e0e0; font-size: 0.9em; }
.modal .score-row input { width: 60px; background: #0d2137; color: #f0d878; border: 1px solid #1e3a50; padding: 8px; border-radius: 4px; font-size: 1.2em; text-align: center; }
.modal .pen-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
.modal .pen-row label { flex: 1; color: #8ab4d8; font-size: 0.8em; }
.modal .pen-row input { width: 50px; background: #0d2137; color: #8ab4d8; border: 1px solid #1e3a50; padding: 4px; border-radius: 4px; text-align: center; font-size: 0.9em; }
.modal .btn-row { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
.btn { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: bold; transition: all 0.2s; }
.btn-save { background: #2a5a30; color: #f0d878; }
.btn-save:hover { background: #3a7a40; }
.btn-cancel { background: #3a2020; color: #aaa; }
.btn-cancel:hover { background: #5a3030; }
.btn-reset { background: #5a3030; color: #e88; margin-left: auto; font-size: 0.8em; padding: 6px 14px; }

/* ── Toolbar ── */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.toolbar .btn-auto { background: #1a3a5c; color: #8ab4d8; font-size: 0.8em; padding: 6px 12px; }

/* ── Hidden sections ── */
.section { display: none; }
.section.active { display: block; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .bracket { min-width: auto; flex-direction: column; }
  .bracket-round { flex-direction: row; flex-wrap: wrap; min-width: auto; }
  .bracket-match { flex: 1; min-width: 140px; }
  .header h1 { font-size: 1.2em; }
}
</style>
</head>
<body>
<div class="header">
  <h1>🏆 2026 FIFA WORLD CUP</h1>
  <div class="subtitle">United States · Canada · Mexico — Knockout Stage Bracket</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('bracket')">🏟 淘汰赛对阵</button>
  <button class="tab" onclick="switchTab('groups')">📊 小组赛</button>
</div>

<div class="container">
  <!-- Bracket Tab -->
  <div id="section-bracket" class="section active">
    <div class="toolbar">
      <button class="btn btn-auto" onclick="autoFillR32()">🔄 自动填充R32晋级队伍</button>
      <button class="btn btn-reset" onclick="resetAll()">⚠ 重置全部比赛</button>
    </div>
    <div class="bracket-container" id="bracket-container">
      <div style="text-align:center;padding:40px;color:#555;">加载中...</div>
    </div>
  </div>

  <!-- Groups Tab -->
  <div id="section-groups" class="section">
    <div class="groups-grid" id="groups-container">
      <div style="text-align:center;padding:40px;color:#555;">加载中...</div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>⚽ 编辑比赛结果</h3>
    <div class="match-info" id="modal-info"></div>
    <div class="team-row">
      <label id="home-label">主队</label>
      <select id="home-select"><option value="">-- 选择队伍 --</option></select>
    </div>
    <div class="score-row">
      <label>比分</label>
      <input type="number" id="home-score" min="0" value="0" onfocus="this.select()">
      <span style="font-size:1.5em;color:#555;">-</span>
      <input type="number" id="away-score" min="0" value="0" onfocus="this.select()">
    </div>
    <div class="team-row">
      <label id="away-label">客队</label>
      <select id="away-select"><option value="">-- 选择队伍 --</option></select>
    </div>
    <div class="pen-row" style="margin-top:12px;">
      <label>⚡ 点球大战 (可选)</label>
      <input type="number" id="home-pen" min="0" placeholder="主">
      <span style="color:#555;">-</span>
      <input type="number" id="away-pen" min="0" placeholder="客">
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-save" onclick="saveMatch()">✅ 保存结果</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
let matchData = null;
let teamsData = null;
let editingMatchId = null;

// ─── Init ────────────────────────────────────────────────
async function init() {
  const [matchesRes, teamsRes] = await Promise.all([
    fetch('/api/matches'),
    fetch('/api/teams')
  ]);
  matchData = await matchesRes.json();
  teamsData = await teamsRes.json();
  buildAllTeamsList();
  renderBracket();
  renderGroups();
}

function buildAllTeamsList() {
  window.allTeams = [];
  if (!teamsData || !teamsData.groups) return;
  for (const g of teamsData.groups) {
    window.allTeams.push({ name: g.winner, flag: '' });
    window.allTeams.push({ name: g.runner_up, flag: '' });
    if (g.third_place_advances) {
      window.allTeams.push({ name: g.third_place, flag: '' });
    }
  }
  window.allTeams.sort((a, b) => a.name.localeCompare(b.name));
  window.teamNames = window.allTeams.map(t => t.name);
}

// ─── Tabs ────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${tab === 'bracket' ? 1 : 2})`).classList.add('active');
  document.getElementById(`section-${tab}`).classList.add('active');
}

// ─── Groups ──────────────────────────────────────────────
function renderGroups() {
  if (!teamsData || !teamsData.groups) return;
  let html = '';
  for (const g of teamsData.groups) {
    html += `<div class="group-card">
      <div class="group-header">${g.group}</div>
      <table><thead><tr><th>队伍</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
    for (const t of g.standings) {
      const adv = (g.winner === t.team || g.runner_up === t.team || 
                   (g.third_place_advances && g.third_place === t.team));
      html += `<tr class="${adv ? 'advanced' : ''}"><td>${adv ? '✓ ' : ''}${t.team} ${t.flag || ''}</td>
        <td>${t.played}</td><td>${t.wins}</td><td>${t.draws}</td><td>${t.losses}</td>
        <td>${t.goal_diff > 0 ? '+' : ''}${t.goal_diff}</td><td><b>${t.points}</b></td></tr>`;
    }
    html += `</tbody></table>
      <div class="qual-note">晋级: ${g.winner} (1st), ${g.runner_up} (2nd)${g.third_place_advances ? ', ' + g.third_place + ' (3rd)' : ''}</div>
    </div>`;
  }
  document.getElementById('groups-container').innerHTML = html;
}

// ─── Bracket ─────────────────────────────────────────────
function renderBracket() {
  if (!matchData) return;
  const rounds = ['R32', 'R16', 'QF', 'SF', '3rd', 'F'];
  const roundNames = { R32: 'Round of 32', R16: 'Round of 16', QF: 'Quarterfinals', SF: 'Semifinals', '3rd': '第三名', F: '🏆 决赛' };
  const roundHeights = { R32: 16, R16: 8, QF: 4, SF: 2, '3rd': 1, F: 1 };

  let html = '<div class="bracket">';
  for (let ri = 0; ri < rounds.length; ri++) {
    const round = rounds[ri];
    const matches = matchData.matches.filter(m => m.round === round);
    html += `<div class="bracket-round" style="min-width:${round === 'F' || round === '3rd' ? 200 : 170}px;">`;
    html += `<div class="round-title">${roundNames[round]}</div>`;

    // Calculate spacing based on match count
    const spacing = round === 'F' || round === '3rd' ? 'center' : 'space-around';
    html += `<div style="display:flex;flex-direction:column;justify-content:${spacing};height:100%;min-height:${Math.max(300, matches.length * 60)}px;">`;
    
    for (const m of matches) {
      const homeWon = m.winner === 'home';
      const awayWon = m.winner === 'away';
      const hasScore = m.home_score !== null && m.away_score !== null;
      const homeTeam = m.home || 'TBD';
      const awayTeam = m.away || 'TBD';
      
      html += `<div class="bracket-match${m.winner ? ' has-winner' : ''}" onclick="openModal('${m.id}')" title="点击编辑比分">
        <div class="team home${homeWon ? ' winner-team' : ''}${!m.home ? ' tbd' : ''}">
          <span>${homeTeam} ${m.home_pen !== null && m.home_pen !== undefined ? '(p)' : ''}</span>
          <span class="score">${hasScore ? m.home_score : '-'}</span>
        </div>
        <div class="team away${awayWon ? ' winner-team' : ''}${!m.away ? ' tbd' : ''}">
          <span>${awayTeam} ${m.away_pen !== null && m.away_pen !== undefined ? '(p)' : ''}</span>
          <span class="score">${hasScore ? m.away_score : '-'}</span>
        </div>
        ${m.date ? `<div class="match-date">📅 ${m.date}</div>` : ''}
        ${m.venue ? `<div class="match-venue">📍 ${m.venue}</div>` : ''}
      </div>`;
    }
    html += '</div></div>';

    // Connector between rounds (except last)
    if (ri < rounds.length - 1) {
      html += '<div class="bracket-connector" style="min-width:30px;display:flex;align-items:center;justify-content:center;color:#333;font-size:1.5em;">→</div>';
    }
  }
  html += '</div>';
  document.getElementById('bracket-container').innerHTML = html;
}

// ─── Modal ───────────────────────────────────────────────
function openModal(matchId) {
  editingMatchId = matchId;
  const m = matchData.matches.find(x => x.id === matchId);
  if (!m) return;

  document.getElementById('modal-info').innerHTML = 
    `<b>${matchData.rounds[m.round].name}</b> — ${m.date || ''}<br>📍 ${m.venue || ''}`;

  // Populate team selects
  const homeSel = document.getElementById('home-select');
  const awaySel = document.getElementById('away-select');
  [homeSel, awaySel].forEach(sel => {
    sel.innerHTML = '<option value="">-- 选择队伍 --</option>';
    for (const t of window.teamNames || []) {
      sel.innerHTML += `<option value="${t}">${t}</option>`;
    }
  });

  homeSel.value = m.home || '';
  awaySel.value = m.away || '';
  document.getElementById('home-score').value = m.home_score ?? 0;
  document.getElementById('away-score').value = m.away_score ?? 0;
  document.getElementById('home-pen').value = m.home_pen ?? '';
  document.getElementById('away-pen').value = m.away_pen ?? '';
  document.getElementById('home-label').textContent = '主队 (Home)';
  document.getElementById('away-label').textContent = '客队 (Away)';

  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  editingMatchId = null;
}

async function saveMatch() {
  const home = document.getElementById('home-select').value;
  const away = document.getElementById('away-select').value;
  const hs = parseInt(document.getElementById('home-score').value);
  const as = parseInt(document.getElementById('away-score').value);
  const hp = document.getElementById('home-pen').value ? parseInt(document.getElementById('home-pen').value) : null;
  const ap = document.getElementById('away-pen').value ? parseInt(document.getElementById('away-pen').value) : null;

  if (isNaN(hs) || isNaN(as)) { alert('请输入有效比分'); return; }

  // Update teams if changed
  if (home || away) {
    await fetch('/api/match/teams', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: editingMatchId, home, away })
    });
  }

  const res = await fetch('/api/match', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: editingMatchId, home_score: hs, away_score: as, home_pen: hp, away_pen: ap })
  });

  if (res.ok) {
    // Refresh data
    const resp = await fetch('/api/matches');
    matchData = await resp.json();
    renderBracket();
    closeModal();
  } else {
    alert('保存失败');
  }
}

// ─── Auto-fill R32 ──────────────────────────────────────
async function autoFillR32() {
  if (!teamsData || !teamsData.groups) return alert('队伍数据未加载');
  
  // Build mapping: determine which teams go to which R32 match
  // Based on 2026 format: 12 group winners + 12 runners-up + 8 best 3rd place
  const groupWinners = teamsData.groups.map(g => g.winner);
  const groupRunnersUp = teamsData.groups.map(g => g.runner_up);
  const thirdPlaceTeams = teamsData.groups.filter(g => g.third_place_advances).map(g => g.third_place);
  
  // Standard 32-team bracket mapping for 2026:
  // This follows the FIFA pre-determined bracket
  // For simplicity, assign based on a standard pattern
  const r32Assignments = [];
  
  // We need to know the specific bracket mapping. For 2026 with 12 groups:
  // The bracket slots are filled based on which groups the 3rd place teams come from.
  // Let's use a generic mapping for now that the user can adjust.
  
  // Simplified: assign group winners and runners-up to R32 matches
  // M1: 1A vs 3rd?, M2: 2C vs 2D, etc.
  // Without exact FIFA bracket, let's just fill what we can
  
  let msg = '此功能自动填充R32比赛队伍。\\n请手动在每组对阵中选择正确的队伍。\\n\\n';
  msg += `小组第一 (12): ${groupWinners.join(', ')}\\n`;
  msg += `小组第二 (12): ${groupRunnersUp.join(', ')}\\n`;
  if (thirdPlaceTeams.length > 0) {
    msg += `晋级第三名 (${thirdPlaceTeams.length}): ${thirdPlaceTeams.join(', ')}\\n`;
  }
  msg += '\\n点击确定后，请逐个编辑比赛来设置队伍和比分。';
  
  alert(msg);
}

// ─── Reset ───────────────────────────────────────────────
async function resetAll() {
  if (!confirm('确定要重置所有淘汰赛比分吗？此操作不可撤销！')) return;
  const res = await fetch('/api/reset', { method: 'POST' });
  if (res.ok) {
    const resp = await fetch('/api/matches');
    matchData = await resp.json();
    renderBracket();
  }
}

// ─── Start ───────────────────────────────────────────────
init();

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
