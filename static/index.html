<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA World Cup - Knockout Bracket</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a1628; color: #e0e0e0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 50%, #1a3a5c 100%); padding: 14px 24px;
  text-align: center; border-bottom: 3px solid #c9a84c; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 1.5em; color: #f0d878; letter-spacing: 2px; }
.header .subtitle { font-size: 0.82em; color: #8ab4d8; margin-top: 2px; }
.tabs { display: flex; gap: 2px; background: #0d2137; padding: 6px 24px 0; position: sticky; top: 68px; z-index: 99; }
.tab { padding: 8px 20px; background: #152a40; color: #8ab4d8; border: none; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 0.88em; }
.tab.active { background: #1a3a5c; color: #f0d878; font-weight: bold; }
.container { max-width: 1600px; margin: 0 auto; padding: 16px; }
.section { display: none; }
.section.active { display: block; }

/* Groups Grid */
.groups-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media (max-width: 1200px) { .groups-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 900px) { .groups-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 550px) { .groups-grid { grid-template-columns: 1fr; } }
.group-card { background: #112233; border-radius: 8px; overflow: hidden; border: 1px solid #1e3a50; }
.group-card .group-header { background: #1a3a5c; padding: 7px 10px; font-weight: bold; color: #f0d878; font-size: 0.92em; }
.group-card table { width: 100%; border-collapse: collapse; font-size: 0.75em; }
.group-card th { background: #0d2137; padding: 4px 5px; text-align: left; color: #8ab4d8; font-weight: normal; font-size: 0.82em; }
.group-card td { padding: 3px 5px; border-bottom: 1px solid #0d2137; }
.group-card tr.advanced { background: rgba(201,168,76,0.15); }
.group-card tr.advanced td:first-child { font-weight: bold; color: #f0d878; }
.group-card .qual-note { font-size: 0.68em; color: #c9a84c; padding: 5px 8px; border-top: 1px solid #1e3a50; }
.num { text-align: center; }

/* Bracket */
.bracket-container { overflow-x: auto; padding: 10px 0; }
.bracket { display: flex; gap: 0; min-width: 1400px; justify-content: center; }
.bracket-round { display: flex; flex-direction: column; justify-content: space-around; min-width: 175px; }
.bracket-round .round-title { text-align: center; color: #f0d878; font-weight: bold; padding: 7px; font-size: 0.82em; background: #1a3a5c; border-radius: 4px; margin-bottom: 5px; }
.bracket-match { background: #112233; border: 1px solid #1e3a50; border-radius: 6px; margin: 3px 6px; cursor: pointer; transition: all 0.2s; overflow: hidden; }
.bracket-match:hover { border-color: #c9a84c; box-shadow: 0 0 12px rgba(201,168,76,0.25); }
.bracket-match .team { padding: 5px 8px; font-size: 0.75em; white-space: nowrap; display: flex; justify-content: space-between; align-items: center; }
.bracket-match .team.home { border-bottom: 1px solid #1e3a50; }
.bracket-match .team .score { font-weight: bold; color: #f0d878; font-size: 1.05em; margin-left: 6px; min-width: 14px; text-align: center; }
.bracket-match .team.winner { color: #f0d878; font-weight: bold; }
.bracket-match .team.tbd { color: #555; font-style: italic; }
.bracket-match .match-date { font-size: 0.62em; color: #555; text-align: center; padding: 1px 0; }
.bracket-match .match-venue { font-size: 0.58em; color: #444; text-align: center; padding-bottom: 3px; }
.bracket-match.has-winner { border-color: #2a5a30; background: #0d1a12; }
.arrow-col { display: flex; align-items: center; justify-content: center; min-width: 24px; color: #333; font-size: 1.3em; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #112233; border: 2px solid #1e3a50; border-radius: 12px; padding: 24px; min-width: 360px; max-width: 450px; }
.modal h3 { color: #f0d878; margin-bottom: 14px; text-align: center; }
.modal .match-info { text-align: center; color: #8ab4d8; font-size: 0.82em; margin-bottom: 10px; }
.modal .fm-row { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
.modal .fm-row label { flex: 1; color: #e0e0e0; font-weight: bold; font-size: 0.9em; }
.modal .fm-row select { flex: 2; background: #0d2137; color: #e0e0e0; border: 1px solid #1e3a50; padding: 6px 8px; border-radius: 4px; font-size: 0.88em; }
.modal .fm-row input { width: 60px; background: #0d2137; color: #f0d878; border: 1px solid #1e3a50; padding: 7px; border-radius: 4px; font-size: 1.1em; text-align: center; }
.modal .pen-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
.modal .pen-row label { flex: 1; color: #8ab4d8; font-size: 0.76em; }
.modal .pen-row input { width: 48px; background: #0d2137; color: #8ab4d8; border: 1px solid #1e3a50; padding: 4px; border-radius: 4px; text-align: center; font-size: 0.85em; }
.modal .btn-row { display: flex; gap: 10px; margin-top: 18px; justify-content: center; }
.btn { padding: 9px 22px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.88em; font-weight: bold; transition: all 0.2s; }
.btn-save { background: #2a5a30; color: #f0d878; } .btn-save:hover { background: #3a7a40; }
.btn-cancel { background: #3a2020; color: #aaa; } .btn-cancel:hover { background: #5a3030; }
.btn-reset { background: #5a3030; color: #e88; font-size: 0.76em; padding: 6px 12px; }

/* Toolbar */
.toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.toolbar .btn-auto { background: #1a3a5c; color: #8ab4d8; font-size: 0.76em; padding: 6px 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>🏆 2026 FIFA WORLD CUP</h1>
  <div class="subtitle">United States · Canada · Mexico — 12 Groups → 32-Team Knockout</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('bracket')">🏟 淘汰赛对阵</button>
  <button class="tab" onclick="switchTab('groups')">📊 小组赛积分</button>
</div>

<div class="container">
  <div id="section-bracket" class="section active">
    <div class="toolbar">
      <button class="btn-auto" onclick="fillR32FromStandings()">🔄 从小组赛自动填R32队伍</button>
      <button class="btn-reset" onclick="resetAll()">⚠ 重置淘汰赛</button>
    </div>
    <div class="bracket-container" id="bracket-container">
      <div style="text-align:center;padding:60px;color:#555;">加载中...</div>
    </div>
  </div>

  <div id="section-groups" class="section">
    <div class="groups-grid" id="groups-container">
      <div style="text-align:center;padding:60px;color:#555;">加载中...</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>⚽ 编辑比赛结果</h3>
    <div class="match-info" id="modal-info"></div>
    <div class="fm-row">
      <label>主队</label>
      <select id="home-select"><option value="">-- 选择队伍 --</option></select>
    </div>
    <div class="fm-row">
      <label>比分</label>
      <input type="number" id="home-score" min="0" value="0" onfocus="this.select()">
      <span style="font-size:1.4em;color:#555;">-</span>
      <input type="number" id="away-score" min="0" value="0" onfocus="this.select()">
    </div>
    <div class="fm-row">
      <label>客队</label>
      <select id="away-select"><option value="">-- 选择队伍 --</option></select>
    </div>
    <div class="pen-row">
      <label>⚡ 点球 (可选)</label>
      <input type="number" id="home-pen" min="0" placeholder="主">
      <span style="color:#555;">-</span>
      <input type="number" id="away-pen" min="0" placeholder="客">
    </div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-save" onclick="saveMatch()">✅ 保存结果</button>
    </div>
  </div>
</div>

<script>
let matchData = null;
let standingsData = null;
let editingMatchId = null;
let allTeamNames = [];

async function init() {
  try {
    const r = await fetch('/api/all');
    const d = await r.json();
    matchData = d.matches;
    standingsData = d.standings;
    
    // Build flat team list from standings
    allTeamNames = [];
    if (standingsData) {
      for (const g of Object.keys(standingsData).sort()) {
        for (const t of standingsData[g]) {
          if (!allTeamNames.includes(t.team)) allTeamNames.push(t.team);
        }
      }
    }
    allTeamNames.sort();
    
    renderBracket();
    renderGroups();
  } catch(e) {
    document.getElementById('bracket-container').innerHTML = 
      '<div style="text-align:center;padding:60px;color:#e88;">加载失败: ' + e.message + '</div>';
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const idx = tab === 'bracket' ? 1 : 2;
  document.querySelector(`.tab:nth-child(${idx})`).classList.add('active');
  document.getElementById('section-' + tab).classList.add('active');
}

// ─── Groups ──────────────────────────────────────────────
function renderGroups() {
  if (!standingsData) return;
  const groupOrder = 'ABCDEFGHIJKL'.split('');
  let html = '';
  for (const g of groupOrder) {
    const rows = standingsData[g];
    if (!rows) continue;
    const top2 = rows.slice(0, 2).map(r => r.team);
    html += '<div class="group-card">';
    html += '<div class="group-header">Group ' + g + '</div>';
    html += '<table><thead><tr><th>#</th><th>Team</th><th class="num">P</th><th class="num">W</th><th class="num">D</th><th class="num">L</th><th class="num">GF</th><th class="num">GA</th><th class="num">GD</th><th class="num">Pts</th></tr></thead><tbody>';
    for (const t of rows) {
      const adv = top2.includes(t.team);
      const gdStr = t.gd > 0 ? '+' + t.gd : '' + t.gd;
      html += '<tr class="' + (adv ? 'advanced' : '') + '">';
      html += '<td>' + (adv ? '✓' : t.pos) + '</td>';
      html += '<td>' + t.team + '</td>';
      html += '<td class="num">' + t.p + '</td>';
      html += '<td class="num">' + t.w + '</td>';
      html += '<td class="num">' + t.d + '</td>';
      html += '<td class="num">' + t.l + '</td>';
      html += '<td class="num">' + t.gf + '</td>';
      html += '<td class="num">' + t.ga + '</td>';
      html += '<td class="num">' + gdStr + '</td>';
      html += '<td class="num"><b>' + t.pts + '</b></td>';
      html += '</tr>';
    }
    html += '</tbody></table>';
    html += '<div class="qual-note">晋级: ' + top2.join(', ') + '</div>';
    html += '</div>';
  }
  document.getElementById('groups-container').innerHTML = html;
}

// ─── Bracket ─────────────────────────────────────────────
function renderBracket() {
  if (!matchData || !matchData.matches) return;
  const rounds = ['R32', 'R16', 'QF', 'SF', '3rd', 'F'];
  const roundNames = { R32: 'Round of 32', R16: 'Round of 16', QF: 'Quarter-finals', SF: 'Semi-finals', '3rd': 'Third Place', F: '🏆 Final' };
  
  let html = '<div class="bracket">';
  for (let ri = 0; ri < rounds.length; ri++) {
    const round = rounds[ri];
    const matches = matchData.matches.filter(m => m.round === round);
    // Sort: final and 3rd place last
    matches.sort((a,b) => a.id.localeCompare(b.id));
    
    const isFinal = round === 'F' || round === '3rd';
    html += '<div class="bracket-round" style="min-width:' + (isFinal ? 200 : 170) + 'px;">';
    html += '<div class="round-title">' + roundNames[round] + '</div>';
    
    const minH = Math.max(280, matches.length * 62);
    html += '<div style="display:flex;flex-direction:column;justify-content:space-around;min-height:' + minH + 'px;">';
    
    for (const m of matches) {
      const homeWon = m.winner === 'home';
      const awayWon = m.winner === 'away';
      const hasScore = m.home_score !== null && m.away_score !== null;
      
      html += '<div class="bracket-match' + (m.winner ? ' has-winner' : '') + '" onclick="openModal(\'' + m.id + '\')" title="Click to edit">';
      html += '<div class="team home' + (homeWon ? ' winner' : '') + (!m.home ? ' tbd' : '') + '">';
      html += '<span>' + (m.home || 'TBD') + '</span>';
      html += '<span class="score">' + (hasScore ? m.home_score : '-') + '</span>';
      html += '</div>';
      html += '<div class="team away' + (awayWon ? ' winner' : '') + (!m.away ? ' tbd' : '') + '">';
      html += '<span>' + (m.away || 'TBD') + '</span>';
      html += '<span class="score">' + (hasScore ? m.away_score : '-') + '</span>';
      html += '</div>';
      if (m.date) html += '<div class="match-date">' + m.date + '</div>';
      if (m.venue) html += '<div class="match-venue">' + m.venue + '</div>';
      html += '</div>';
    }
    html += '</div></div>';
    
    if (ri < rounds.length - 1) {
      html += '<div class="arrow-col">→</div>';
    }
  }
  html += '</div>';
  document.getElementById('bracket-container').innerHTML = html;
}

// ─── Modal ───────────────────────────────────────────────
function openModal(matchId) {
  editingMatchId = matchId;
  const m = matchData.matches.find(x => x.id === matchId);
  if (!m) return;
  
  document.getElementById('modal-info').innerHTML =
    '<b>' + matchData.rounds[m.round].name + '</b> — ' + (m.date || '') + '<br>📍 ' + (m.venue || '');
  
  // Populate team selects
  const opts = '<option value="">-- TBD --</option>' + allTeamNames.map(t => '<option value="' + t + '">' + t + '</option>').join('');
  document.getElementById('home-select').innerHTML = opts;
  document.getElementById('away-select').innerHTML = opts;
  document.getElementById('home-select').value = m.home || '';
  document.getElementById('away-select').value = m.away || '';
  document.getElementById('home-score').value = m.home_score ?? '';
  document.getElementById('away-score').value = m.away_score ?? '';
  document.getElementById('home-pen').value = m.home_pen ?? '';
  document.getElementById('away-pen').value = m.away_pen ?? '';
  
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  editingMatchId = null;
}

async function saveMatch() {
  const home = document.getElementById('home-select').value;
  const away = document.getElementById('away-select').value;
  const hs = document.getElementById('home-score').value === '' ? null : parseInt(document.getElementById('home-score').value);
  const as = document.getElementById('away-score').value === '' ? null : parseInt(document.getElementById('away-score').value);
  const hpv = document.getElementById('home-pen').value;
  const apv = document.getElementById('away-pen').value;
  const hp = hpv === '' ? null : parseInt(hpv);
  const ap = apv === '' ? null : parseInt(apv);

  if (hs === null || as === null || isNaN(hs) || isNaN(as)) {
    alert('请输入有效的比分数字！');
    return;
  }

  // Update teams first
  await fetch('/api/match/teams', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: editingMatchId, home: home || null, away: away || null })
  });

  const res = await fetch('/api/match', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: editingMatchId, home_score: hs, away_score: as, home_pen: hp, away_pen: ap })
  });

  if (res.ok) {
    const resp = await fetch('/api/matches');
    matchData = await resp.json();
    renderBracket();
    closeModal();
  } else {
    alert('保存失败！');
  }
}

// ─── Auto-fill R32 from standings ────────────────────────
async function fillR32FromStandings() {
  if (!standingsData) return alert('No standings data');
  
  // Collect group winners and runners-up
  const groupOrder = 'ABCDEFGHIJKL'.split('');
  const winners = [];
  const runnersUp = [];
  for (const g of groupOrder) {
    const rows = standingsData[g];
    if (rows && rows.length >= 2) {
      winners.push({ group: g, team: rows[0].team });
      runnersUp.push({ group: g, team: rows[1].team });
    }
  }
  
  // FIFA 2026 bracket mapping for R32 (simplified, based on known pattern)
  // Groups A-D: top half, E-H: middle, I-L: bottom half
  // This is a simplified mapping. Exact FIFA bracket depends on 3rd place qualifiers.
  const mapping = [
    { id: 'M1',  home: winners[0].team },           // 1A
    { id: 'M2',  home: runnersUp[2].team, away: runnersUp[3].team }, // 2C vs 2D
    { id: 'M3',  home: winners[1].team },            // 1B
    { id: 'M4',  home: runnersUp[0].team, away: runnersUp[1].team }, // 2A vs 2B
    { id: 'M5',  home: winners[2].team },            // 1C
    { id: 'M6',  home: winners[3].team },            // 1D
    { id: 'M7',  home: winners[4].team },            // 1E
    { id: 'M8',  home: runnersUp[4].team, away: runnersUp[5].team }, // 2E vs 2F
    { id: 'M9',  home: winners[5].team },            // 1F
    { id: 'M10', home: winners[6].team },            // 1G
    { id: 'M11', home: winners[7].team },            // 1H
    { id: 'M12', home: runnersUp[6].team, away: runnersUp[7].team }, // 2G vs 2H
    { id: 'M13', home: winners[8].team },            // 1I
    { id: 'M14', home: runnersUp[8].team, away: runnersUp[9].team }, // 2I vs 2J
    { id: 'M15', home: winners[9].team },            // 1J
    { id: 'M16', home: winners[10].team, away: winners[11].team }, // 1K vs 1L
  ];
  
  let count = 0;
  for (const m of mapping) {
    const match = matchData.matches.find(x => x.id === m.id);
    if (match) {
      if (m.home && !match.home) {
        await fetch('/api/match/teams', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: m.id, home: m.home, away: m.away || null })
        });
        count++;
      }
    }
  }
  
  // Also set up the remaining R32 matches with runners-up
  // The remaining 3rd-place slots need manual assignment
  
  // Refresh
  const resp = await fetch('/api/matches');
  matchData = await resp.json();
  renderBracket();
  alert('已填充 ' + count + ' 场比赛的已知队伍！\n\n剩余的"最佳第三名"对阵需要手动选择队伍。');
}

async function resetAll() {
  if (!confirm('确定要重置所有淘汰赛比分吗？此操作不可撤销！')) return;
  await fetch('/api/reset', { method: 'POST' });
  const resp = await fetch('/api/matches');
  matchData = await resp.json();
  renderBracket();
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
</body>
</html>
