<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 世界杯冠军预测 · 淘汰赛对阵</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;background:#0a0f1a;color:#d0d8e8;min-height:100vh}
.header{background:linear-gradient(135deg,#0d1f35,#162d50,#0d1f35);padding:12px 20px;text-align:center;border-bottom:2px solid #c9a84c;position:sticky;top:0;z-index:100}
.header h1{font-size:1.5em;color:#f0d878;letter-spacing:2px}
.header .sub{font-size:.78em;color:#7aa4c8;margin-top:2px}
.nav{display:flex;gap:0;background:#0d1f35;position:sticky;top:64px;z-index:99;overflow-x:auto;scrollbar-width:none;padding:0 12px}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:10px 16px;background:#122840;color:#7aa4c8;border:none;cursor:pointer;white-space:nowrap;font-size:.8em;transition:all .2s;border-radius:6px 6px 0 0;margin-right:1px}
.nav-btn:hover{background:#1a3858;color:#a0c8e8}
.nav-btn.active{background:#162d50;color:#f0d878;font-weight:bold}
.container{max-width:1600px;margin:0 auto;padding:16px}
.card{background:#0f1a2e;border:1px solid #1a3050;border-radius:10px;padding:16px;margin-bottom:14px}
.card h3{color:#f0d878;font-size:.95em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1a3050}
.ranking-bar{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;margin:3px 0;transition:all .2s;cursor:pointer}
.ranking-bar:hover{background:rgba(201,168,76,.08)}
.ranking-bar .rk{font-weight:bold;font-size:1.1em;min-width:28px;text-align:center;color:#c9a84c}
.ranking-bar .flag{font-size:1.4em;min-width:32px}
.ranking-bar .name{flex:1;font-size:.9em;font-weight:500}
.ranking-bar .prob{font-weight:bold;color:#f0d878;font-size:.9em;min-width:55px;text-align:right}
.ranking-bar .bar-wrap{flex:2;height:8px;background:#0d1f35;border-radius:4px;overflow:hidden}
.ranking-bar .bar-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#f0d878);border-radius:4px;transition:width .5s}
.factor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.factor-tag{display:flex;justify-content:space-between;padding:5px 8px;border-radius:4px;background:rgba(201,168,76,.06);font-size:.8em}
.factor-tag .val{color:#f0d878;font-weight:bold}
.squad-list{max-height:500px;overflow-y:auto;font-size:.78em}
.squad-list table{width:100%;border-collapse:collapse}
.squad-list th{background:#0d1f35;padding:6px 8px;text-align:left;color:#7aa4c8;position:sticky;top:0;font-size:.85em}
.squad-list td{padding:4px 8px;border-bottom:1px solid #0d1f35}
.h2h-compare{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;text-align:center;align-items:center}
.h2h-team{background:#0d1f35;padding:16px;border-radius:8px}
.h2h-team .flag{font-size:3em}
.h2h-team .name{font-size:1.1em;font-weight:bold;color:#f0d878}
.h2h-team .elo{font-size:.8em;color:#7aa4c8}
.h2h-vs{font-size:1.5em;color:#c9a84c;font-weight:bold}
.h2h-probs{margin-top:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center}
.h2h-probs .p{font-size:1.3em;font-weight:bold;color:#f0d878}
.h2h-probs .l{font-size:.7em;color:#7aa4c8}
.bracket-wrap{overflow-x:auto;padding:20px 0}
.bracket-tree{display:flex;min-width:1500px;justify-content:center}
.bracket-col{display:flex;flex-direction:column;justify-content:space-around;min-width:175px}
.bracket-col .col-title{text-align:center;color:#f0d878;font-weight:bold;padding:6px;font-size:.8em;background:#162d50;border-radius:4px;margin-bottom:4px}
.bracket-match{background:#0f1a2e;border:1px solid #1a3050;border-radius:6px;margin:2px 6px;cursor:pointer;transition:all .2s}
.bracket-match:hover{border-color:#c9a84c;box-shadow:0 0 12px rgba(201,168,76,.25)}
.bracket-match .row{padding:5px 8px;font-size:.73em;display:flex;justify-content:space-between;align-items:center}
.bracket-match .row.top{border-bottom:1px solid #1a3050}
.bracket-match .row .sc{font-weight:bold;color:#f0d878;font-size:1em;margin-left:6px}
.bracket-match .row.w{color:#f0d878;font-weight:bold}
.bracket-match .row.tbd{color:#445;font-style:italic}
.bracket-match.won{border-color:#2a5a30;background:#0a1a10}
.bracket-arrow{display:flex;align-items:center;justify-content:center;min-width:32px}
.bracket-arrow svg{overflow:visible}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#0f1a2e;border:2px solid #1a3050;border-radius:12px;padding:20px;min-width:350px;max-width:460px}
.modal h3{color:#f0d878;text-align:center;margin-bottom:12px}
.modal .info{text-align:center;color:#7aa4c8;font-size:.8em;margin-bottom:10px}
.modal .row{display:flex;align-items:center;gap:8px;margin:8px 0}
.modal .row label{flex:1;color:#c0c8d8;font-weight:bold;font-size:.85em}
.modal .row select,.modal .row input{background:#0d1f35;color:#d0d8e8;border:1px solid #1a3050;padding:7px 8px;border-radius:5px;font-size:.85em}
.modal .row select{flex:2}
.modal .row input{width:55px;text-align:center}
.btn{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:.85em;font-weight:bold;transition:all .2s}
.btn-save{background:#2a5a30;color:#f0d878}.btn-save:hover{background:#3a7a40}
.btn-cancel{background:#2a2020;color:#999}.btn-cancel:hover{background:#4a3030}
.btn-bar{display:flex;gap:8px;margin:14px 0 4px;flex-wrap:wrap}
.btn-sm{font-size:.73em;padding:6px 12px;border-radius:4px;border:none;cursor:pointer;background:#162d50;color:#7aa4c8}
.btn-sm:hover{background:#1a3858}
select{max-width:220px}
.badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:.7em;font-weight:bold}
.badge-red{background:#5a2020;color:#f88}
.badge-yellow{background:#5a5020;color:#fc8}
.badge-green{background:#205a20;color:#8f8}
.text-center{text-align:center}
.mt-8{margin-top:8px}
.loading{text-align:center;padding:60px;color:#556}
.error{text-align:center;padding:40px;color:#e88}
.flex-between{display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<div class="header">
  <h1> 2026 世界杯 · 冠军预测系统</h1>
  <div class="sub">美国 · 加拿大 · 墨西哥 联合主办 ｜ 48支球队 · 32强淘汰赛</div>
</div>

<nav class="nav" id="nav">
  <button class="nav-btn active" data-tab="predict"> 冠军预测</button>
  <button class="nav-btn" data-tab="factor"> 因子分析</button>
  <button class="nav-btn" data-tab="mystic"> 玄学分析</button>
  <button class="nav-btn" data-tab="h2h"> 对战预测</button>
  <button class="nav-btn" data-tab="squad"> 球员阵容</button>
  <button class="nav-btn" data-tab="bracket"> 淘汰赛对阵</button>
</nav>

<div class="container" id="app">
  <div class="loading">正在加载预测数据，请稍候...</div>
</div>

<div class="modal-overlay" id="modal">
<div class="modal">
<h3> 编辑比赛结果</h3>
<div class="info" id="modal-info"></div>
<div class="row"><label>主队</label><select id="m-home"><option value="">-- 请选择 --</option></select></div>
<div class="row"><label>比分</label><input type="number" id="m-hs" min="0" value="0"> <span>-</span> <input type="number" id="m-as" min="0" value="0"></div>
<div class="row"><label>客队</label><select id="m-away"><option value="">-- 请选择 --</option></select></div>
<div class="row"><label>点球大战（可选）</label><input type="number" id="m-hp" min="0" placeholder="主队"> - <input type="number" id="m-ap" min="0" placeholder="客队"></div>
<div class="flex-between mt-8">
  <button class="btn btn-cancel" onclick="closeModal()">取消</button>
  <button class="btn btn-save" onclick="saveMatch()"> 保存结果</button>
</div>
</div>
</div>

<script>
// 轮次中文名称映射
var ROUND_NAMES_CN = {
  R32: '32强淘汰赛', R16: '16强淘汰赛', QF: '四分之一决赛',
  SF: '半决赛', '3rd': '季军争夺赛', F: ' 冠军决赛'
};

var matchData = null, standingsData = null, predictData = null, editingMatchId = null, allTeams = [], teamsData = null;

async function init(){
  try{
    var r = await fetch('/api/all');
    var d = await r.json();
    matchData = d.matches;
    standingsData = d.standings;
    teamsData = d.teams;
    if(standingsData) for(var g in standingsData) for(var i=0; i<standingsData[g].length; i++)
      if(allTeams.indexOf(standingsData[g][i].team) < 0) allTeams.push(standingsData[g][i].team);
    allTeams.sort();
    try{
      var p = await fetch('/api/predict/all');
      if(p.ok) predictData = await p.json();
    }catch(e){}
    renderAll();
  }catch(e){
    document.getElementById('app').innerHTML = '<div class="error">加载失败：' + e.message + '</div>';
  }
}

document.getElementById('nav').addEventListener('click', function(e){
  if(!e.target.classList.contains('nav-btn')) return;
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  e.target.classList.add('active');
  renderAll();
});

function activeTab(){
  var btn = document.querySelector('.nav-btn.active');
  return btn ? btn.dataset.tab : 'predict';
}

function renderAll(){
  var tab = activeTab(), html = '';
  switch(tab){
    case 'predict': html = renderPredict(); break;
    case 'factor': html = renderFactor(); break;
    case 'mystic': html = renderMystic(); break;
    case 'h2h': html = renderH2H(); break;
    case 'squad': html = renderSquad(); break;
    case 'bracket': html = renderBracketPage(); break;
  }
  document.getElementById('app').innerHTML = html;
}

// ── 1. 冠军预测 ──
function renderPredict(){
  if(!currentFactorTeam && predictData && predictData.rankings && predictData.rankings.length) currentFactorTeam = predictData.rankings[0].team;
  if(!predictData || !predictData.rankings || !predictData.rankings.length)
    return '<div class="card"><h3> 冠军预测排行</h3><div class="loading">预测引擎正在启动，请稍候...</div></div>';
  var r = predictData.rankings;
  var maxProb = 0;
  for(var i=0; i<r.length; i++){ var prob = r[i].adjusted_prob || 0; if(prob > maxProb) maxProb = prob; }
  if(maxProb <= 0) maxProb = 20;
  var h = '<div class="card"><h3> 冠军预测排行 — 蒙特卡洛模拟</h3>';
  h += '<div class="btn-bar"><button class="btn-sm" onclick="location.reload()">刷新 刷新预测</button></div>';
  for(var i=0; i<Math.min(r.length, 32); i++){
    var t = r[i], prob = t.adjusted_prob || 0;
    var barW = prob / maxProb * 100;
    h += '<div class="ranking-bar"><span class="rk">' + (i+1) + '</span><span class="flag">' + getFlag(t.team) + '</span>';
    h += '<span class="name">' + cn(t.team) + '</span>';
    h += '<div class="bar-wrap"><div class="bar-fill" style="width:' + barW + '%"></div></div>';
    h += '<span class="prob">' + prob.toFixed(1) + '%</span></div>';
  }
  h += '<div class="mt-8" style="font-size:.75em;color:#7aa4c8;">基于：实力评分 + 球员数据 + 球队因子 + 玄学修正</div>';
  return h + '</div>';
}

var currentFactorTeam = null;
// ── 2. 因子分析 ──
function renderFactor(){
  if(!predictData || !predictData.rankings || !predictData.rankings.length)
    return '<div class="card"><h3>球队因子分析</h3><div class="loading">数据加载中...</div></div>';
  var h = '<div class="card"><h3>球队评分因子构成（32强排名）</h3>';
  h += '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:.8em;">';
  h += '<thead><tr style="background:#0d1f35;">';
  h += '<th style="padding:6px 8px;text-align:left;color:#7aa4c8;">排名</th>';
  h += '<th style="padding:6px 8px;text-align:left;color:#7aa4c8;">球队</th>';
  h += '<th style="padding:6px 8px;text-align:right;color:#7aa4c8;">实力评分</th>';
  h += '<th style="padding:6px 8px;text-align:right;color:#7aa4c8;">球员数</th>';
  h += '<th style="padding:6px 8px;text-align:right;color:#7aa4c8;">平均年龄</th>';
  h += '<th style="padding:6px 8px;text-align:right;color:#7aa4c8;">综合得分</th>';
  h += '<th style="padding:6px 8px;text-align:right;color:#7aa4c8;">原始概率</th>';
  h += '<th style="padding:6px 8px;text-align:right;color:#7aa4c8;">玄学修正</th>';
  h += '<th style="padding:6px 8px;text-align:right;color:#7aa4c8;">调整概率</th>';
  h += '</tr></thead><tbody>';
  for(var i=0; i<predictData.rankings.length; i++){
    var t = predictData.rankings[i];
    var adj = t.mystic_adjustment || 0;
    var rowBg = (i%2===0) ? '#0f1a2e' : '#0a1525';
    h += '<tr style="background:' + rowBg + ';">';
    h += '<td style="padding:5px 8px;color:#c9a84c;font-weight:bold;">' + (i+1) + '</td>';
    h += '<td style="padding:5px 8px;">' + cn(t.team) + '</td>';
    h += '<td style="padding:5px 8px;text-align:right;">' + (t.elo ? Math.round(t.elo) : '-') + '</td>';
    h += '<td style="padding:5px 8px;text-align:right;">' + (t.player_count || '-') + '</td>';
    h += '<td style="padding:5px 8px;text-align:right;">' + (t.avg_age || '-') + '</td>';
    h += '<td style="padding:5px 8px;text-align:right;color:#f0d878;">' + (t.total_score ? t.total_score.toFixed(3) : '-') + '</td>';
    h += '<td style="padding:5px 8px;text-align:right;">' + ((t.prob||0).toFixed(1)) + '%</td>';
    h += '<td style="padding:5px 8px;text-align:right;color:' + (adj>0?'#8f8':'#e88') + ';">' + (adj>0?'+':'') + adj.toFixed(1) + '%</td>';
    h += '<td style="padding:5px 8px;text-align:right;color:#f0d878;font-weight:bold;">' + ((t.adjusted_prob||0).toFixed(1)) + '%</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  return h + '</div>';
}

// ── 3. 玄学分析 ──
var currentMysticTeam = null;
function renderMystic(){
  if(!currentMysticTeam) currentMysticTeam = allTeams[0];
  if(!predictData)
    return '<div class="card"><h3> 玄学分析</h3><div class="loading">玄学数据加载中...</div></div>';
  var h = '<div class="card"><h3> 玄学因子 — 悖论框架 · 道德经 · 易经</h3>';
  h += '<p style="font-size:.78em;color:#7aa4c8;margin-bottom:10px;">三重境界：看山是山 → 看山不是山 → 看山还是山</p>';
  h += '<div class="btn-bar"><select id="mystic-team" onchange="currentMysticTeam=this.value;renderAll();">';
  for(var i=0; i<Math.min(allTeams.length, 30); i++){
    var mt = allTeams[i];
    h += '<option value="' + mt + '"' + (mt === currentMysticTeam ? ' selected' : '') + '>' + cn(mt) + '</option>';
  }
  h += '</select></div>';
  h += '<div id="mystic-detail" class="mt-8" style="font-size:.8em;color:#a0b8d0;"></div>';
  h += '</div>';
  setTimeout(loadMysticDetail, 300);
  return h;
}
async function loadMysticDetail(){
  
  var team = currentMysticTeam || allTeams[0];
  var r = await fetch('/api/predict/mystic?team=' + encodeURIComponent(team));
  var d = await r.json();
    var h = '';
  if(d.error){ h += '<p style="color:#e88;">错误：' + d.error + '</p>'; }
  else {
    var ts = d.three_stages || {};
    h += '<div class="card" style="padding:10px;margin:6px 0;"><b style="color:#f0d878;">【第一境 · 看山是山】</b><br>' + (ts.stage1||'暂无') + '</div>';
    h += '<div class="card" style="padding:10px;margin:6px 0;"><b style="color:#f0d878;">【第二境 · 看山不是山】</b><br>' + (ts.stage2||'暂无') + '</div>';
    h += '<div class="card" style="padding:10px;margin:6px 0;"><b style="color:#f0d878;">【第三境 · 看山还是山】</b><br>' + (ts.stage3||'暂无') + '</div>';
    h += '<div class="card" style="padding:10px;margin:6px 0;"><b style="color:#c9a84c;">【道德经】</b><br>' + (d.tao_te_ching||'暂无') + '</div>';
    h += '<div class="card" style="padding:10px;margin:6px 0;"><b style="color:#c9a84c;">【易经卦象】</b><br>' + (d.i_ching||'暂无') + '</div>';
    if(d.elo) h += '<div style="font-size:.75em;color:#7aa4c8;margin-top:4px;">实力：' + d.elo + '</div>';
  }
  document.getElementById('mystic-detail').innerHTML = h;
}

// ── 4. 对战预测 ──
function renderH2H(){
  if(!matchData || !matchData.matches) return '<div class="card"><h3> 对战预测</h3><div class="loading">数据加载中...</div></div>';
  var r32matches = matchData.matches.filter(function(m){ return m.round === 'R32'; }).sort(function(a,b){ return a.id.localeCompare(b.id); });
  var h = '<div class="card"><h3> 32强对战预测</h3>';
  h += '<p style="font-size:.78em;color:#7aa4c8;margin-bottom:10px;">点击任意对阵查看详细预测分析</p>';
  h += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;">';
  for(var i=0; i<r32matches.length; i++){
    var m = r32matches[i];
    var home = m.home || '待定', away = m.away || '待定';
    h += '<div class="ranking-bar" onclick="loadH2H(\'' + home + '\',\'' + away + '\')" style="cursor:pointer;padding:6px 8px;font-size:.78em;" title="点击查看预测">';
    h += '<span class="flag" style="font-size:1em;">' + getFlag(home) + '</span><span style="font-size:.8em;">' + cn(home) + '</span>';
    h += '<span style="color:#c9a84c;font-size:.7em;margin:0 2px;">vs</span>';
    h += '<span class="flag" style="font-size:1em;">' + getFlag(away) + '</span><span style="font-size:.8em;">' + cn(away) + '</span>';
    h += '</div>';
  }
  h += '</div><div id="h2h-result" class="mt-8"></div>';
  return h + '</div>';
}
async function loadH2H(ta, tb){
  if(!ta || !tb){ document.getElementById('h2h-result').innerHTML=''; return; }
  document.getElementById('h2h-result').innerHTML = '<div class="loading" style="padding:20px;">正在分析 ' + cn(ta) + ' vs ' + cn(tb) + '...</div>';
  try{
    var r = await fetch('/api/predict/h2h?team1=' + encodeURIComponent(ta) + '&team2=' + encodeURIComponent(tb));
    var d = await r.json();
    if(d.error){ document.getElementById('h2h-result').innerHTML = '<div class="error">请求失败：' + d.error + '</div>'; return; }
    document.getElementById('h2h-result').innerHTML =
      '<div class="card" style="margin-top:10px;">' +
      '<div class="h2h-compare">' +
        '<div class="h2h-team"><div class="flag">' + getFlag(d.team_a) + '</div><div class="name">' + cn(d.team_a) + '</div><div class="elo">实力：' + (d.elo_a||'暂无') + '</div></div>' +
        '<div class="h2h-vs">对阵</div>' +
        '<div class="h2h-team"><div class="flag">' + getFlag(d.team_b) + '</div><div class="name">' + cn(d.team_b) + '</div><div class="elo">实力：' + (d.elo_b||'暂无') + '</div></div>' +
      '</div>' +
      '<div class="h2h-probs">' +
        '<div><div class="p">' + ((d.win_prob_a||0).toFixed(1)) + '%</div><div class="l">' + cn(d.team_a) + ' 胜</div></div>' +
        '<div><div class="p">' + ((d.draw_prob||0).toFixed(1)) + '%</div><div class="l">平局</div></div>' +
        '<div><div class="p">' + ((d.win_prob_b||0).toFixed(1)) + '%</div><div class="l">' + cn(d.team_b) + ' 胜</div></div>' +
      '</div>' +
      '<div class="text-center mt-8" style="font-size:.75em;color:#7aa4c8;">预期进球：' + cn(d.team_a) + ' ' + (d.expected_goals_a||'?').toFixed(1) + ' — ' + (d.expected_goals_b||'?').toFixed(1) + ' ' + cn(d.team_b) + '<br>预测比分（90分钟常规时间）：' + cn(d.team_a) + ' ' + (d.predicted_score||'?-?') + ' ' + cn(d.team_b) + '</div>' +
      '</div>';
  }catch(e){
    document.getElementById('h2h-result').innerHTML = '<div class="error">预测失败：' + e.message + '</div>';
  }
}

// ── 5. 球员阵容 ──
function renderSquad(){
  var h = '<div class="card"><h3> 球员阵容</h3>';
  h += '<div class="btn-bar"><select id="squad-team" onchange="loadSquad()">';
  for(var i=0; i<allTeams.length; i++) h += '<option value="' + allTeams[i] + '">' + cn(allTeams[i]) + '</option>';
  h += '</select></div><div id="squad-result" class="squad-list"></div>';
  h += '</div>';
  setTimeout(loadSquad, 100);
  return h;
}
async function loadSquad(){
  var sel = document.getElementById('squad-team');
  var team = (sel && sel.value) ? sel.value : allTeams[0];
  try{
    var r = await fetch('/api/predict/squad?team=' + encodeURIComponent(team));
    var d = await r.json();
    if(d.error){ document.getElementById('squad-result').innerHTML = '<div class="error">请求失败：' + d.error + '</div>'; return; }
    var players = d.players || [];
    if(!players.length){ document.getElementById('squad-result').innerHTML = '<div class="loading">该队暂无阵容数据</div>'; return; }
    // Get injury/suspension data
    var susp = (predictData && predictData.suspensions) ? predictData.suspensions : {};
    var injured = [];
    var suspended = [];
    if(susp.injuries && susp.injuries[team]) injured = susp.injuries[team].map(function(x){ return x.player; });
    if(susp.suspensions && susp.suspensions[team]) suspended = susp.suspensions[team].map(function(x){ return x.player; });
    var tbl = '<table><thead><tr><th>#</th><th>姓名</th><th>位置</th><th>年龄</th><th>出场</th><th>进球</th><th>状态</th><th>俱乐部</th></tr></thead><tbody>';
    players.slice(0, 26).forEach(function(p, i){
      var name = p.name_cn || p.name || p.player_name || '未知';
      var status = '健康';
      var stClass = '';
      if(injured.some(function(x){ return name.indexOf(x) >= 0 || x.indexOf(name) >= 0; })){ status = '伤病'; stClass = 'color:#e88;'; }
      if(suspended.some(function(x){ return name.indexOf(x) >= 0 || x.indexOf(name) >= 0; })){ status = '停赛'; stClass = 'color:#fc8;'; }
      tbl += '<tr><td>' + (i+1) + '</td><td>' + name + '</td><td>' + (p.position || p.pos || '-') + '</td><td>' + (p.age || '-') + '</td><td>' + (p.caps || p.national_caps || '-') + '</td><td>' + (p.goals || p.national_goals || '-') + '</td><td style="' + stClass + '">' + status + '</td><td>' + (p.club || '-') + '</td></tr>';
    });
    tbl += '</tbody></table>';
    // Show injury/suspension detail below table
    if(susp.injuries && susp.injuries[team] && susp.injuries[team].length){
      tbl += '<div style="margin-top:10px;font-size:.8em;">';
      for(var k=0; k<susp.injuries[team].length; k++){
        var inj = susp.injuries[team][k];
        tbl += '<div style="color:#e88;">[伤病] ' + inj.player + ' — ' + inj.detail + '</div>';
      }
      tbl += '</div>';
    }
    if(susp.suspensions && susp.suspensions[team] && susp.suspensions[team].length){
      tbl += '<div style="margin-top:6px;font-size:.8em;">';
      for(var k=0; k<susp.suspensions[team].length; k++){
        var sus = susp.suspensions[team][k];
        tbl += '<div style="color:#fc8;">[停赛] ' + sus.player + ' — ' + sus.reason + '</div>';
      }
      tbl += '</div>';
    }
    document.getElementById('squad-result').innerHTML = tbl;
  }catch(e){
    document.getElementById('squad-result').innerHTML = '<div class="error">加载失败：' + e.message + '</div>';
  }
}

// ── 7. 淘汰赛对阵 ──
function renderBracketPage(){
  var h = '<div class="card"><h3> 淘汰赛对阵图 — 32强 → 决赛</h3>';
  h += '<div class="btn-bar"><button class="btn-sm" onclick="fillR32()">刷新 自动填充32强</button><button class="btn-sm" onclick="resetBracket()" style="background:#5a3030;color:#e88;">! 重置全部比赛</button></div>';
  h += '<div id="bracket-svg-container" style="overflow-x:auto;"></div>';
  h += '</div>';
  setTimeout(function(){ drawBracketSVG(); }, 150);
  return h;
}

function drawBracketSVG(){
  if(!matchData || !matchData.matches) return;
  var ms = matchData.matches;
  var matchById = {}; ms.forEach(function(m){ matchById[m.id] = m; });
  
  var rounds = ['R32','R16','QF','SF','F','3rd'];
  var labels = ['32强','16强','1/4决赛','半决赛',' 决赛','季军赛'];
  var BOX_W = 155, BOX_H = 50, GAP_Y = 72;
  var X = [10, 215, 420, 625, 830, 1035];
  
  // Build position map
  var pos = {};
  function getRound(round, sort){
    return ms.filter(function(m){ return m.round===round; }).sort(function(a,b){ return a.id.localeCompare(b.id); });
  }
  
  var r32 = getRound('R32');
  for(var i=0; i<r32.length; i++) pos[r32[i].id] = {x:X[0], y:25 + i*GAP_Y};
  
  var r16 = getRound('R16');
  for(var i=0; i<r16.length; i++){
    var y1 = pos[r32[i*2].id].y, y2 = pos[r32[i*2+1].id].y;
    pos[r16[i].id] = {x:X[1], y:(y1+y2+BOX_H)/2 - BOX_H/2};
  }
  
  var qf = getRound('QF');
  for(var i=0; i<qf.length; i++){
    var y1 = pos[r16[i*2].id].y, y2 = pos[r16[i*2+1].id].y;
    pos[qf[i].id] = {x:X[2], y:(y1+y2+BOX_H)/2 - BOX_H/2};
  }
  
  var sf = getRound('SF');
  for(var i=0; i<sf.length; i++){
    var y1 = pos[qf[i*2].id].y, y2 = pos[qf[i*2+1].id].y;
    pos[sf[i].id] = {x:X[3], y:(y1+y2+BOX_H)/2 - BOX_H/2};
  }
  
  var fm = getRound('F')[0];
  var tpm = getRound('3rd')[0];
  if(fm && sf.length>=2){
    var y1 = pos[sf[0].id].y, y2 = pos[sf[1].id].y;
    pos[fm.id] = {x:X[4], y:(y1+y2+BOX_H)/2 - BOX_H/2};
  }
  if(tpm) pos[tpm.id] = {x:X[5], y: pos[fm.id] ? pos[fm.id].y : 400};
  
  var maxY = 25 + 15*GAP_Y + BOX_H + 40;
  var svgW = X[5] + BOX_W + 20;
  
  var svg = '<svg width="' + svgW + '" height="' + maxY + '" style="background:#0a0f1a;font-family:system-ui,sans-serif;">';
  
  // Connector lines
  svg += '<g stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.6">';
  for(var mid in pos){
    var m = matchById[mid]; if(!m || !m.next) continue;
    var p1 = pos[mid], p2 = pos[m.next]; if(!p1 || !p2) continue;
    var x1 = p1.x + BOX_W, y1 = p1.y + BOX_H/2;
    var x2 = p2.x, y2 = p2.y + BOX_H/2;
    var mx = (x1 + x2) / 2;
    svg += '<path d="M' + x1 + ',' + y1 + ' L' + mx + ',' + y1 + ' L' + mx + ',' + y2 + ' L' + x2 + ',' + y2 + '"/>';
  }
  // 3rd place dashed lines from SF losers
  if(tpm && sf.length>=2){
    for(var i=0; i<2; i++){
      var sx = pos[sf[i].id].x + BOX_W, sy = pos[sf[i].id].y + BOX_H*0.75;
      var tx = pos[tpm.id].x, ty = pos[tpm.id].y + BOX_H/2;
      var mx2 = sx + 25;
      svg += '<path d="M' + sx + ',' + sy + ' L' + mx2 + ',' + sy + ' L' + mx2 + ',' + ty + ' L' + tx + ',' + ty + '" stroke="#a08040" stroke-dasharray="5,3"/>';
    }
  }
  svg += '</g>';
  
  // Round titles
  svg += '<g fill="#f0d878" font-size="12" font-weight="bold" text-anchor="middle">';
  for(var i=0; i<rounds.length; i++)
    svg += '<text x="' + (X[i] + BOX_W/2) + '" y="14">' + labels[i] + '</text>';
  svg += '</g>';
  
  // Match boxes
  for(var mid in pos){
    var p = pos[mid], m = matchById[mid]; if(!m) continue;
    var home = m.home ? cn(m.home) : '待定', away = m.away ? cn(m.away) : '待定';
    var hs = m.home_score!=null ? m.home_score : '-', as = m.away_score!=null ? m.away_score : '-';
    var hw = m.winner==='home', aw = m.winner==='away';
    var fill = m.winner ? '#0a1a10' : '#0f1a2e', border = m.winner ? '#2a5a30' : '#1a3050';
    
    svg += '<g>';
    svg += '<rect x="' + p.x + '" y="' + p.y + '" width="' + BOX_W + '" height="' + BOX_H + '" rx="6" fill="' + fill + '" stroke="' + border + '" stroke-width="1.5"/>';
    svg += '<text x="' + (p.x+6) + '" y="' + (p.y+18) + '" fill="' + (hw?'#f0d878':'#c0c8d8') + '" font-size="11" font-weight="' + (hw?'bold':'normal') + '">' + home.substring(0,14) + '</text>';
    svg += '<text x="' + (p.x+BOX_W-6) + '" y="' + (p.y+18) + '" fill="#f0d878" font-size="11" font-weight="bold" text-anchor="end">' + hs + '</text>';
    svg += '<line x1="' + (p.x+4) + '" y1="' + (p.y+BOX_H/2) + '" x2="' + (p.x+BOX_W-4) + '" y2="' + (p.y+BOX_H/2) + '" stroke="#1a3050" stroke-width="1"/>';
    if(m.date) svg += '<text x="' + (p.x+BOX_W/2) + '" y="' + (p.y+BOX_H+14) + '" fill="#7aa4c8" font-size="8" text-anchor="middle">' + m.date + '</text>';
    svg += '<text x="' + (p.x+6) + '" y="' + (p.y+40) + '" fill="' + (aw?'#f0d878':'#c0c8d8') + '" font-size="11" font-weight="' + (aw?'bold':'normal') + '">' + away.substring(0,14) + '</text>';
    svg += '<text x="' + (p.x+BOX_W-6) + '" y="' + (p.y+40) + '" fill="#f0d878" font-size="11" font-weight="bold" text-anchor="end">' + as + '</text>';
    svg += '</g>';
  }
  
  svg += '</svg>';
  document.getElementById('bracket-svg-container').innerHTML = svg;
}

// ── 编辑弹窗 ──
function openModal(id){
  editingMatchId = id;
  var m = matchData.matches.find(function(x){ return x.id === id; });
  if(!m) return;
  var rn = ROUND_NAMES_CN[m.round] || (matchData.rounds[m.round] ? matchData.rounds[m.round].name : m.round);
  document.getElementById('modal-info').innerHTML = '<b>' + rn + '</b> — ' + (m.date||'') + '<br> ' + (m.venue||'');
  var opts = '<option value="">-- 请选择 --</option>';
  for(var i=0; i<allTeams.length; i++) opts += '<option value="\' + allTeams[i] + \'">\' + cn(allTeams[i]) + \'</option>';
  document.getElementById('m-home').innerHTML = opts;
  document.getElementById('m-away').innerHTML = opts;
  document.getElementById('m-home').value = m.home || '';
  document.getElementById('m-away').value = m.away || '';
  document.getElementById('m-hs').value = m.home_score !== null && m.home_score !== undefined ? m.home_score : '';
  document.getElementById('m-as').value = m.away_score !== null && m.away_score !== undefined ? m.away_score : '';
  document.getElementById('m-hp').value = m.home_pen !== null && m.home_pen !== undefined ? m.home_pen : '';
  document.getElementById('m-ap').value = m.away_pen !== null && m.away_pen !== undefined ? m.away_pen : '';
  document.getElementById('modal').classList.add('show');
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  editingMatchId = null;
}
async function saveMatch(){
  var home = document.getElementById('m-home').value, away = document.getElementById('m-away').value;
  var hs = document.getElementById('m-hs').value === '' ? null : parseInt(document.getElementById('m-hs').value);
  var as = document.getElementById('m-as').value === '' ? null : parseInt(document.getElementById('m-as').value);
  var hp = document.getElementById('m-hp').value === '' ? null : parseInt(document.getElementById('m-hp').value);
  var ap = document.getElementById('m-ap').value === '' ? null : parseInt(document.getElementById('m-ap').value);
  if(hs === null || as === null || isNaN(hs) || isNaN(as)){ alert('请输入有效的比分数字！'); return; }
  await fetch('/api/match/teams', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:editingMatchId,home:home||null,away:away||null})});
  var r = await fetch('/api/match', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:editingMatchId,home_score:hs,away_score:as,home_pen:hp,away_pen:ap})});
  if(r.ok){
    var rr = await fetch('/api/matches'); matchData = await rr.json();
    renderAll(); closeModal();
  } else { alert('保存失败，请重试！'); }
}
async function fillR32(){
  if(!standingsData) return alert('暂无小组赛数据，无法自动填充');
  var gw = ['A','B','C','D','E','F','G','H','I','J','K','L'].map(function(g){
    var rows = standingsData[g]; return rows && rows.length>0 ? rows[0].team : null;
  });
  var pairs = [
    {id:'M1',home:gw[0]},{id:'M3',home:gw[1]},{id:'M5',home:gw[2]},{id:'M6',home:gw[3]},
    {id:'M7',home:gw[4]},{id:'M9',home:gw[5]},{id:'M10',home:gw[6]},{id:'M11',home:gw[7]},
    {id:'M13',home:gw[8]},{id:'M15',home:gw[9]}
  ];
  var cnt = 0;
  for(var i=0; i<pairs.length; i++){
    var p = pairs[i];
    var m = matchData.matches.find(function(x){ return x.id === p.id; });
    if(m && p.home && !m.home){
      await fetch('/api/match/teams', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:p.id,home:p.home})});
      cnt++;
    }
  }
  var rr = await fetch('/api/matches'); matchData = await rr.json();
  renderAll();
  alert('已自动填充 ' + cnt + ' 场32强比赛的小组第一队伍！\n\n其余对阵（部分小组第二的对决、最佳第三名对阵）请手动选择。');
}
async function resetBracket(){
  if(!confirm('确定要重置所有淘汰赛比分和晋级结果吗？此操作不可撤销！')) return;
  await fetch('/api/reset', {method:'POST'});
  var rr = await fetch('/api/matches'); matchData = await rr.json();
  renderAll();
}
